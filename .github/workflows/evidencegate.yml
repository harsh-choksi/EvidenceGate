name: EvidenceGate

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  cached-evidence-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm demo
      - name: Verify corrected demo bundle
        run: pnpm evidencegate verify .evidencegate/demo/corrected/evidence-bundle.json
